<!DOCTYPE html>
<html lang="ku" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krd Link - داشبۆرد</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Vazirmatn', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .dashboard-header {
            width: 100%;
            max-width: 440px;
            background: #0a0a0a;
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            padding: 12px 20px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 0 0 20px rgba(139, 92, 246, 0.05);
            box-sizing: border-box;
        }

        .menu-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            cursor: pointer;
            transition: background 0.3s, border-color 0.3s;
        }

        .menu-btn:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: rgba(168, 85, 247, 0.4);
        }

        .dashboard-container {
            width: 100%;
            max-width: 440px;
            background: #0a0a0a;
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 0 0 20px rgba(139, 92, 246, 0.05);
            box-sizing: border-box;
        }

        .welcome-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .welcome-box h3 {
            margin: 0 0 5px 0;
            color: #a855f7;
            font-size: 1.1rem;
        }

        .welcome-box p {
            margin: 0;
            color: #94a3b8;
            font-size: 0.85rem;
        }

        .section-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #e2e8f0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            background: #050505;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 12px 16px;
            color: #fff;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.9rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #a855f7;
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, #a855f7, #7e22ce);
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 12px;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
            transition: opacity 0.3s, transform 0.2s;
            margin-top: 5px;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .logout-section {
            margin-top: 20px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 15px;
        }

        .logout-link {
            color: #f87171;
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.9rem;
            text-decoration: underline;
        }

        /* --- دیزاین مێنیووی تەنیشت (Sidebar Menu Modal) --- */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .menu-overlay.active {
            display: flex;
            opacity: 1;
        }

        .menu-modal {
            background: #0a0a0a;
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 28px;
            width: 90%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.9), 0 0 25px rgba(139, 92, 246, 0.1);
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .menu-overlay.active .menu-modal {
            transform: scale(1);
        }

        .menu-top-row {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            cursor: pointer;
            transition: background 0.3s;
        }

        .close-btn:hover {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
        }

        .menu-lang-box {
            background: #050505;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .lang-select {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }

        .lang-select option {
            background: #0a0a0a;
            color: #fff;
        }

        .menu-section-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin: 18px 0 10px 0;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-items-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 14px;
            color: #cbd5e1;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .menu-item.active {
            background: rgba(139, 92, 246, 0.15);
            border-color: rgba(168, 85, 247, 0.4);
            color: #fff;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .menu-item svg {
            color: #a855f7;
        }
    </style>
</head>
<body>

    <header class="dashboard-header">
        <button class="menu-btn" onclick="toggleMenu()">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>
    </header>

    <div class="dashboard-container">
        <div class="welcome-box">
            <h3 id="displayUsername">بەکارهێنەر</h3>
            <p>بەخێر هاتیت بۆ پڕۆفایلەکەت</p>
        </div>

        <div class="section-title">زیادکردنی لینکێکی نوێ</div>
        <div class="form-group">
            <input type="text" id="linkTitle" placeholder="ناونیشانی لینک (بۆ نموونە: تیلیگرام)">
        </div>
        <div class="form-group">
            <input type="url" id="linkUrl" placeholder="بەستەر (https://...)">
        </div>
        <button class="btn" onclick="addLink()">زیادکردن</button>

        <div class="logout-section">
            <button class="logout-link" onclick="logout()">چوونە دەرەوە لە هەژمار</button>
        </div>
    </div>

    <!-- پەنجەرەی مێنیووی تەنیشت (Sidebar Menu Modal) -->
    <div class="menu-overlay" id="menuOverlay" onclick="closeMenuOutside(event)">
        <div class="menu-modal">
            <div class="menu-top-row">
                <button class="close-btn" onclick="toggleMenu()">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <div class="menu-lang-box">
                <select class="lang-select" id="languageSelect">
                    <option value="ku">کوردی (Kurdish)</option>
                    <option value="en">English</option>
                </select>
            </div>

            <!-- بەشی Overview -->
            <div class="menu-section-label">
                <span>Overview</span>
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path></svg>
            </div>
            <div class="menu-items-list">
                <div class="menu-item active">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                    <span>Overview</span>
                </div>
                <div class="menu-item">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    <span>Badge Overview</span>
                </div>
                <div class="menu-item">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    <span>Analysis</span>
                </div>
            </div>

            <!-- بەشی SOCIAL -->
            <div class="menu-section-label">
                <span>SOCIAL</span>
            </div>
            <div class="menu-items-list">
                <div class="menu-item">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                    <span>Links</span>
                </div>
            </div>

            <!-- بەشی ACCOUNT -->
            <div class="menu-section-label">
                <span>ACCOUNT</span>
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path></svg>
            </div>
            <div class="menu-items-list">
                <div class="menu-item">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    <span>Settings</span>
                </div>
                <div class="menu-item">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <span>Premium</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const currentUser = localStorage.getItem('current_user');
            if (!currentUser) {
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('displayUsername').innerText = currentUser;
        });

        function logout() {
            localStorage.removeItem('current_user');
            window.location.href = 'index.html';
        }

        function toggleMenu() {
            const overlay = document.getElementById('menuOverlay');
            overlay.classList.toggle('active');
        }

        function closeMenuOutside(event) {
            const overlay = document.getElementById('menuOverlay');
            if (event.target === overlay) {
                overlay.classList.remove('active');
            }
        }

        function addLink() {
            const title = document.getElementById('linkTitle').value.trim();
            const url = document.getElementById('linkUrl').value.trim();

            if (!title || !url) {
                alert('تکایە هەردوو خانەکە پڕ بکەرەوە!');
                return;
            }

            alert('لینکەکە بە سەرکەوتوویی وەرگیرا!');
            document.getElementById('linkTitle').value = '';
            document.getElementById('linkUrl').value = '';
        }
    </script>

</body>
</html>
