<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krd Link - لۆگین</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .error-msg {
            color: #f87171;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>چوونە ژوورەوە</h1>
        <p class="bio">بۆ هاتنە ژوورەوە بۆ داشبۆرد زانیارییەکانت بنووسە</p>

        <div class="form-group">
            <label>ناوی بەکارهێنەر (Username)</label>
            <input type="text" id="username" placeholder="ناوی بەکارهێنەر...">
        </div>

        <div class="form-group">
            <label>وشەی تێپەڕ (Password)</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn" onclick="handleLogin()">چوونە ژوورەوە</button>
        <div id="errorMsg" class="error-msg">ناوی بەکارهێنەر یان وشەی تێپەڕ هەڵەیە!</div>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            if (!user || !pass) {
                errorMsg.innerText = "تکایە هەردوو خانە پڕ بکەرەوە!";
                errorMsg.style.display = 'block';
                return;
            }

            // لێرەدا بۆ تاقیکردنەوە: ناوی admin و پاسۆردی admin دانراوە
            if (user === "admin" && pass === "admin") {
                localStorage.setItem('current_user', user);
                window.location.href = 'admin.html';
            } else {
                errorMsg.innerText = "ناوی بەکارهێنەر یان وشەی تێپەڕ هەڵەیە! (admin / admin)";
                errorMsg.style.display = 'block';
            }
        }
    </script>

</body>
</html>
