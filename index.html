<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krd Link - دروستکردنی ئەکاونت و لۆگین</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .site-header {
            width: 100%;
            max-width: 440px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 10px 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .logo-area {
            display: flex;
            align-items: center;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #8b5cf6, #38bdf8);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            color: #fff;
            font-size: 1.2rem;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            cursor: pointer;
            transition: background 0.3s;
        }

        .menu-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* شێوازی بەشی زمان */
        .lang-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            padding: 0 12px;
            height: 40px;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            transition: background 0.3s;
        }

        .lang-select option {
            background: #1e293b;
            color: #fff;
        }

        .lang-select:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        body {
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 30px;
        }

        .error-msg {
            color: #f87171;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <!-- بەشی سەرەوە (Header) کە دوگمەی مینیو و بەشی زمانی تێدایە -->
    <header class="site-header">
        <div class="header-left">
            <button class="menu-btn" onclick="alert('مینیو و ڕێکخستنەکان')">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <select class="lang-select" onchange="changeLanguage(this.value)">
                <option value="ku">کوردی</option>
                <option value="en">English</option>
            </select>
        </div>
        
        <div class="logo-area">
            <div class="logo-icon">K</div>
        </div>
    </header>

    <!-- فۆرمی سەرەکی -->
    <div class="container">
        <h1 id="formTitle">دروستکردنی ئەکاونت</h1>
        <p class="bio" id="formSubtitle">ئەکاونتێکی نوێ دروست بکە بۆ پلاتفۆرمەکە</p>

        <div class="form-group">
            <label id="userLabel">ناوی ئەکاونت</label>
            <input type="text" id="username" placeholder="ناوی ئەکاونت بنووسە...">
        </div>

        <div class="form-group" id="emailGroup">
            <label>ئیمێڵ</label>
            <input type="email" id="email" placeholder="example@domain.com">
        </div>

        <div class="form-group">
            <label>وشەنهێنی</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn" id="actionBtn" onclick="handleAuth()">دروست کردن</button>
        <div id="errorMsg" class="error-msg"></div>

        <div class="switch-text">
            <span id="switchQuestion">هەژمارت هەیە؟</span> 
            <a id="switchBtn" onclick="toggleMode()">چوونە ژوورەوە</a>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const currentUser = localStorage.getItem('current_user');
            if (currentUser) {
                window.location.href = 'admin.html';
            }
        });

        let isSignup = true;

        function toggleMode() {
            isSignup = !isSignup;
            const title = document.getElementById('formTitle');
            const subtitle = document.getElementById('formSubtitle');
            const btn = document.getElementById('actionBtn');
            const question = document.getElementById('switchQuestion');
            const switchBtn = document.getElementById('switchBtn');
            const emailGroup = document.getElementById('emailGroup');
            const userLabel = document.getElementById('userLabel');
            const errorMsg = document.getElementById('errorMsg');
            
            errorMsg.style.display = 'none';

            if (isSignup) {
                title.innerText = "دروستکردنی ئەکاونت";
                subtitle.innerText = "ئەکاونتێکی نوێ دروست بکە بۆ پلاتفۆرمەکە";
                btn.innerText = "دروست کردن";
                question.innerText = "هەژمارت هەیە؟";
                switchBtn.innerText = "چوونە ژوورەوە";
                emailGroup.style.display = "block";
                userLabel.innerText = "ناوی ئەکاونت";
            } else {
                title.innerText = "چوونە ژوورەوە";
                subtitle.innerText = "بۆ چوونە ژوورەوە زانیارییەکانت بنووسە";
                btn.innerText = "چوونە ژوورەوە";
                question.innerText = "هەژمارت نییە؟";
                switchBtn.innerText = "دروست کردن";
                emailGroup.style.display = "none";
                userLabel.innerText = "ناوی بەکارهێنەر یان ئەکاونت";
            }
        }

        function changeLanguage(lang) {
            // دەتوانیت لێرەدا کۆدی گۆڕینی زمانی سایتەکە زیاد بکەیت لە داهاتوودا
            console.LANGUAGE = lang;
        }

        function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            if (!user || !pass || (isSignup && !email)) {
                errorMsg.innerText = "تکایە هەموو خانە پێویستەکان پڕ بکەرەوە!";
                errorMsg.style.display = 'block';
                return;
            }

            let users = JSON.parse(localStorage.getItem('krd_users')) || [];

            if (isSignup) {
                const exists = users.find(u => u.username === user || u.email === email);
                if (exists) {
                    errorMsg.innerText = "ئەم ناو یان ئیمێڵە پێشتر دروست کراوە!";
                    errorMsg.style.display = 'block';
                    return;
                }
                users.push({ email: email, username: user, password: pass });
                localStorage.setItem('krd_users', JSON.stringify(users));
                alert('ئەکاونتەکەت بە سەرکەوتوویی دروست کرا! ئێستا دەتوانیت لۆگین بکەی.');
                toggleMode();
            } else {
                const validUser = users.find(u => u.username === user && u.password === pass);
                if (validUser || (users.length === 0 && user === "admin" && pass === "admin")) {
                    localStorage.setItem('current_user', user);
                    window.location.href = 'admin.html';
                } else {
                    errorMsg.innerText = "ناوی ئەکاونت یان وشەنهێنی هەڵەیە!";
                    errorMsg.style.display = 'block';
                }
            }
        }
    </script>

</body>
</html>
