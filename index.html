<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krd Link - چوونە ژوورەوە / تۆماربوون</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1 id="formTitle">چوونە ژوورەوە</h1>
        <p class="bio" id="formSubtitle">بۆ بەڕێوەبردنی لینکەکانت لۆگین بکە</p>

        <div class="form-group">
            <label>ناوی بەکارهێنەر (Username)</label>
            <input type="text" id="username" placeholder="ناوی بەکارهێنەر بنووسە...">
        </div>

        <div class="form-group">
            <label>وشەی تێپەڕ (Password)</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn" id="actionBtn" onclick="handleAuth()">چوونە ژوورەوە</button>
        <div id="errorMsg" class="error-msg"></div>

        <div class="switch-text">
            <span id="switchQuestion">هەژمارت نییە؟</span> 
            <a id="switchBtn" onclick="toggleMode()">دروستکردنی ئەکاونت</a>
        </div>
    </div>

    <script>
        // پشکنین ئەگەر پێشتر یۆزەر لۆگینی کردبێت، ڕاستەوخۆ بچێتە داشبۆرد
        window.addEventListener('DOMContentLoaded', () => {
            const currentUser = localStorage.getItem('current_user');
            if (currentUser) {
                window.location.href = 'admin.html';
            }
        });

        let isSignup = false;

        function toggleMode() {
            isSignup = !isSignup;
            const title = document.getElementById('formTitle');
            const subtitle = document.getElementById('formSubtitle');
            const btn = document.getElementById('actionBtn');
            const question = document.getElementById('switchQuestion');
            const switchBtn = document.getElementById('switchBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            errorMsg.style.display = 'none';

            if (isSignup) {
                title.innerText = "دروستکردنی ئەکاونت";
                subtitle.innerText = "ئەکاونتێکی نوێ دروست بکە بۆ پلاتفۆرمەکە";
                btn.innerText = "تۆمارکردن";
                question.innerText = "هەژمارت هەیە؟";
                switchBtn.innerText = "چوونە ژوورەوە";
            } else {
                title.innerText = "چوونە ژوورەوە";
                subtitle.innerText = "بۆ بەڕێوەبردنی لینکەکانت لۆگین بکە";
                btn.innerText = "چوونە ژوورەوە";
                question.innerText = "هەژمارت نییە؟";
                switchBtn.innerText = "دروستکردنی ئەکاونت";
            }
        }

        function handleAuth() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            if (!user || !pass) {
                errorMsg.innerText = "تکایە هەردوو خانە پڕ بکەرەوە!";
                errorMsg.style.display = 'block';
                return;
            }

            let users = JSON.parse(localStorage.getItem('krd_users')) || [];

            if (isSignup) {
                // پشکنینی بوونی یۆزەر
                const exists = users.find(u => u.username === user);
                if (exists) {
                    errorMsg.innerText = "ئەم ناوی بەکارهێنەرە پێشتر هەڵگیراوە!";
                    errorMsg.style.display = 'block';
                    return;
                }
                // دروستکردنی ئەکاونتی نوێ
                users.push({ username: user, password: pass });
                localStorage.setItem('krd_users', JSON.stringify(users));
                alert('ئەکاونتەکەت بە سەرکەوتوویی دروست کرا! ئێستا لۆگین بکە.');
                toggleMode();
            } else {
                // پشکنینی زانیارییەکانی لۆگین (یاخود یۆزەری سەرەتایی admin / admin)
                const validUser = users.find(u => u.username === user && u.password === pass);
                if (validUser || (users.length === 0 && user === "admin" && pass === "admin")) {
                    localStorage.setItem('current_user', user);
                    window.location.href = 'admin.html';
                } else {
                    errorMsg.innerText = "ناوی بەکارهێنەر یان وشەی تێپەڕ هەڵەیە!";
                    errorMsg.style.display = 'block';
                }
            }
        }
    </script>

</body>
</html>
