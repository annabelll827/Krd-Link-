<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krd Link - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Vazirmatn', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            background: #0a0a0a;
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 600;
        }

        .input-group input {
            background: #0d0d0d;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 14px 16px;
            color: #fff;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            border-color: rgba(168, 85, 247, 0.6);
        }

        .login-btn {
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            border: none;
            border-radius: 14px;
            padding: 14px;
            color: #fff;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-title">چوونە ژوورەوە</div>
        
        <div class="input-group">
            <label for="usernameInput">ناوی بەکارهێنەر (Username)</label>
            <input type="text" id="usernameInput" placeholder="نموونە: Hammmm">
        </div>

        <button class="login-btn" onclick="loginUser()">چوونە ژوورەوە</button>
    </div>

    <script>
        function loginUser() {
            const username = document.getElementById('usernameInput').value.trim();
            if (username !== "") {
                localStorage.setItem('current_user', username);
                window.location.href = 'dashboard.html';
            } else {
                alert('تکایە ناوی بەکارهێنەر بنووسە!');
            }
        }
    </script>
</body>
</html>
