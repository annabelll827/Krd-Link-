<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krd Link - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Vazirmatn', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard-header {
            width: 100%;
            max-width: 440px;
            background: #0a0a0a;
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        .menu-btn, .logout-icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: rgba(168, 85, 247, 0.4);
        }

        .logout-icon-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
            color: #ef4444;
        }

        .main-content-wrapper {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .dashboard-container {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .profile-card, .stats-card, .clicks-card {
            background: #0d0d0d;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 24px;
        }

        .profile-top-row, .stats-top-row, .clicks-top-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .profile-icon-box, .stats-icon-box, .clicks-icon-box {
            border-radius: 12px;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-icon-box { background: rgba(234, 179, 8, 0.12); color: #eab308; }
        .stats-icon-box { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .clicks-icon-box { background: rgba(168, 85, 247, 0.15); color: #a855f7; }

        .title-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #94a3b8;
            font-weight: 700;
        }

        .username-display, .number-display {
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            text-align: right;
        }
        
        .number-display { font-size: 2.8rem; line-height: 1; }

        /* بەشی Badge Overview */
        .badge-view-container {
            display: none;
            width: 100%;
            background: #0a0a0a;
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 28px;
            padding: 25px;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        .badge-card {
            background: #0d0d0d;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .badge-icon {
            width: 42px;
            height: 42px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
        }

        .badge-details h4 {
            margin: 0 0 4px 0;
            font-size: 1rem;
            color: #ffffff;
            font-weight: 700;
        }

        .badge-details p {
            margin: 0;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .badge-action-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 8px 14px;
            color: #94a3b8;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* مێنیووی تەنیشت */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .menu-overlay.active {
            display: flex;
        }

        .menu-modal {
            background: #0a0a0a;
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 28px;
            width: 90%;
            max-width: 400px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.9);
        }

        .menu-top-row {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            cursor: pointer;
        }

        .menu-section-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin: 18px 0 10px 0;
            font-weight: 700;
        }

        .menu-items-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 14px;
            color: #cbd5e1;
            font-size: 0.95rem;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .menu-item.active {
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.4);
            color: #fff;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .menu-item svg {
            color: #a855f7;
        }
    </style>
</head>
<body>

    <header class="dashboard-header">
        <button class="menu-btn" onclick="toggleMenu()">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>

        <button class="logout-icon-btn" title="چوونە دەرەوە" onclick="logoutUser()">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
            </svg>
        </button>
    </header>

    <div class="main-content-wrapper">
        <!-- داشبۆردی سەرەکی (Overview) -->
        <div class="dashboard-container" id="overviewSection">
            <div class="profile-card">
                <div class="profile-top-row">
                    <div class="profile-icon-box">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </div>
                    <div class="title-tag">YOUR PROFILE</div>
                </div>
                <div class="username-display" id="displayUsername">Hammmm</div>
            </div>

            <div class="stats-card">
                <div class="stats-top-row">
                    <div class="stats-icon-box">
                        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                        </svg>
                    </div>
                    <div class="title-tag">PROFAIL VIUW</div>
                </div>
                <div class="number-display" id="profileViewsCount">187</div>
            </div>

            <div class="clicks-card">
                <div class="clicks-top-row">
                    <div class="clicks-icon-box">
                        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path>
                        </svg>
                    </div>
                    <div class="title-tag">LINK CLICKS</div>
                </div>
                <div class="number-display" id="linkClicksCount">13</div>
            </div>
        </div>

        <!-- بەشی Badge Overview -->
        <div class="badge-view-container" id="badgeSection">
            <div class="badge-card">
                <div class="badge-info">
                    <div class="badge-icon" style="background: rgba(234, 179, 8, 0.15); color: #eab308;">
                        <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm14 3a1 1 0 01-1 1H6a1 1 0 01-1-1v-1h14v1z"/></svg>
                    </div>
                    <div class="badge-details">
                        <h4>Ceo</h4>
                        <p>Locked</p>
                    </div>
                </div>
                <button class="badge-action-btn">Not available</button>
            </div>
        </div>
    </div>

    <!-- مێنیووی تەنیشت -->
    <div class="menu-overlay" id="menuOverlay" onclick="closeMenuOutside(event)">
        <div class="menu-modal">
            <div class="menu-top-row">
                <button class="close-btn" onclick="toggleMenu()">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <div class="menu-section-label">Overview</div>
            <div class="menu-items-list">
                <div class="menu-item active" id="menuOverview" onclick="switchSection('overview')">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                    <span>Overview</span>
                </div>
                <div class="menu-item" id="menuBadge" onclick="switchSection('badge')">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    <span>Badge Overview</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const currentUser = localStorage.getItem('current_user') || 'Hammmm';
            document.getElementById('displayUsername').innerText = currentUser;

            let viewsKey = 'profile_views_' + currentUser;
            let currentViews = localStorage.getItem(viewsKey) || 187;
            document.getElementById('profileViewsCount').innerText = currentViews;

            let clicksKey = 'link_clicks_' + currentUser;
            let currentClicks = localStorage.getItem(clicksKey) || 13;
            document.getElementById('linkClicksCount').innerText = currentClicks;
        });

        function logoutUser() {
            localStorage.removeItem('current_user');
            window.location.href = 'index.html';
        }

        function switchSection(section) {
            const overviewSec = document.getElementById('overviewSection');
            const badgeSec = document.getElementById('badgeSection');
            const menuOverview = document.getElementById('menuOverview');
            const menuBadge = document.getElementById('menuBadge');

            if (section === 'overview') {
                overviewSec.style.display = 'flex';
                badgeSec.style.display = 'none';
                menuOverview.classList.add('active');
                menuBadge.classList.remove('active');
            } else if (section === 'badge') {
                overviewSec.style.display = 'none';
                badgeSec.style.display = 'flex';
                menuBadge.classList.add('active');
                menuOverview.classList.remove('active');
            }
            toggleMenu();
        }

        function toggleMenu() {
            document.getElementById('menuOverlay').classList.toggle('active');
        }

        function closeMenuOutside(event) {
            if (event.target === document.getElementById('menuOverlay')) {
                document.getElementById('menuOverlay').classList.remove('active');
            }
        }
    </script>
</body>
</html>
