<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krd Link - دروستکردنی ئەکاونت و لۆگین</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .error-msg {
            color: #f87171;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="formTitle">دروستکردنی ئەکاونت</h1>
        <p class="bio" id="formSubtitle">ئەکاونتێکی نوێ دروست بکە بۆ پلاتفۆرمەکە</p>

        <!-- ناوی ئەکاونت (Username) -->
        <div class="form-group">
            <label id="userLabel">ناوی ئەکاونت</label>
            <input type="text" id="username" placeholder="ناوی ئەکاونت بنووسە...">
        </div>

        <!-- خانەی ئیمێڵ -->
        <div class="form-group" id="emailGroup">
            <label>ئیمێڵ</label>
            <input type="email" id="email" placeholder="example@domain.com">
        </div>

        <!-- وشەنهێنی (Password) -->
        <div class="form-group">
            <label>وشەنهێنی</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn" id="actionBtn" onclick="handleAuth()">دروست کردن</button>
        <div id="errorMsg" class="error-msg"></div>

        <div class="switch-text">
            <span id="switchQuestion">هەژمارت هەیە؟</span> 
            <a id="switchBtn" onclick="toggleMode()">چوونە ژوورەوە</a>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const currentUser = localStorage.getItem('current_user');
            if (currentUser) {
                window.location.href = 'admin.html';
            }
        });

        let isSignup = true;

        function toggleMode() {
            isSignup = !isSignup;
            const title = document.getElementById('formTitle');
            const subtitle = document.getElementById('formSubtitle');
            const btn = document.getElementById('actionBtn');
            const question = document.getElementById('switchQuestion');
            const switchBtn = document.getElementById('switchBtn');
            const emailGroup = document.getElementById('emailGroup');
            const userLabel = document.getElementById('userLabel');
            const errorMsg = document.getElementById('errorMsg');
            
            errorMsg.style.display = 'none';

            if (isSignup) {
                title.innerText = "دروستکردنی ئەکاونت";
                subtitle.innerText = "ئەکاونتێکی نوێ دروست بکە بۆ پلاتفۆرمەکە";
                btn.innerText = "دروست کردن";
                question.innerText = "هەژمارت هەیە؟";
                switchBtn.innerText = "چوونە ژوورەوە";
                emailGroup.style.display = "block";
                userLabel.innerText = "ناوی ئەکاونت";
            } else {
                title.innerText = "چوونە ژوورەوە";
                subtitle.innerText = "بۆ چوونە ژوورەوە زانیارییەکانت بنووسە";
                btn.innerText = "چوونە ژوورەوە";
                question.innerText = "هەژمارت نییە؟";
                switchBtn.innerText = "دروست کردن";
                emailGroup.style.display = "none";
                userLabel.innerText = "ناوی بەکارهێنەر یان ئەکاونت";
            }
        }

        function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            if (!user || !pass || (isSignup && !email)) {
                errorMsg.innerText = "تکایە هەموو خانە پێویستەکان پڕ بکەرەوە!";
                errorMsg.style.display = 'block';
                return;
            }

            let users = JSON.parse(localStorage.getItem('krd_users')) || [];

            if (isSignup) {
                const exists = users.find(u => u.username === user || u.email === email);
                if (exists) {
                    errorMsg.innerText = "ئەم ناو یان ئیمێڵە پێشتر دروست کراوە!";
                    errorMsg.style.display = 'block';
                    return;
                }
                users.push({ email: email, username: user, password: pass });
                localStorage.setItem('krd_users', JSON.stringify(users));
                alert('ئەکاونتەکەت بە سەرکەوتوویی دروست کرا! ئێستا دەتوانیت لۆگین بکەی.');
                toggleMode();
            } else {
                const validUser = users.find(u => u.username === user && u.password === pass);
                if (validUser || (users.length === 0 && user === "admin" && pass === "admin")) {
                    localStorage.setItem('current_user', user);
                    window.location.href = 'admin.html';
                } else {
                    errorMsg.innerText = "ناوی ئەکاونت یان وشەنهێنی هەڵەیە!";
                    errorMsg.style.display = 'block';
                }
            }
        }
    </script>

</body>
</html>
