<!DOCTYPE html>
<html lang="ku" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Krd Link - دروستکردنی ئەکاونت و لۆگین</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #000000 !important;
            color: #ffffff;
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 30px;
        }

        .container, .site-header {
            background: #0a0a0a !important;
            border: 1px solid rgba(139, 92, 246, 0.2) !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 0 0 20px rgba(139, 92, 246, 0.05);
        }

        .site-header {
            width: 100%;
            max-width: 440px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 10px 20px;
            margin-bottom: 20px;
        }

        .logo-area {
            display: flex;
            align-items: center;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #a855f7, #7e22ce) !important;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            color: #fff;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            cursor: pointer;
            transition: background 0.3s;
        }

        .menu-btn:hover {
            background: rgba(139, 92, 246, 0.2);
        }

        .lang-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            padding: 0 12px;
            height: 40px;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            transition: background 0.3s;
        }

        .lang-select option {
            background: #0a0a0a;
            color: #fff;
        }

        .lang-select:hover {
            background: rgba(139, 92, 246, 0.2);
        }

        .btn {
            background: linear-gradient(135deg, #a855f7, #7e22ce) !important;
            color: #fff !important;
            border: none;
            transition: opacity 0.3s, transform 0.2s;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        input {
            background: #050505 !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #fff !important;
        }

        input:focus {
            border-color: #a855f7 !important;
            outline: none;
        }

        .error-msg {
            color: #f87171;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }

        .switch-text a {
            color: #a855f7 !important;
            cursor: pointer;
            text-decoration: underline;
        }

        /* بەشی پیشاندانی خاوەن سەحی شین (Verified Users) */
        .verified-section {
            margin-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
            width: 100%;
        }

        .verified-title {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .verified-list {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none; /* بۆ ناشاردنەوەی سکڕۆڵبار لە فایرفۆکس */
        }

        .verified-list::-webkit-scrollbar {
            display: none; /* بۆ ناشاردنەوەی سکڕۆڵبار لە کرۆم و سەفاری */
        }

        .verified-user-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 8px 12px;
            min-width: 75px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .verified-user-card:hover {
            border-color: rgba(168, 85, 247, 0.5);
            background: rgba(168, 85, 247, 0.05);
        }

        .verified-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 6px;
        }

        .verified-name-wrapper {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .verified-username {
            font-size: 0.75rem;
            color: #e2e8f0;
            white-space: nowrap;
        }

        /* سەحی شین */
        .blue-tick {
            width: 12px;
            height: 12px;
            background-color: #3b82f6;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 8px;
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="header-left">
            <button class="menu-btn" onclick="alert('Menu & Settings')">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <select class="lang-select" id="langSelector" onchange="changeLanguage(this.value)">
                <option value="ku">کوردی</option>
                <option value="en">English</option>
            </select>
        </div>
        
        <div class="logo-area">
            <div class="logo-icon">K</div>
        </div>
    </header>

    <div class="container">
        <h1 id="formTitle">دروستکردنی ئەکاونت</h1>
        <p class="bio" id="formSubtitle">ئەکاونتێکی نوێ دروست بکە بۆ پلاتفۆرمەکە</p>

        <div class="form-group">
            <label id="userLabel">ناوی ئەکاونت</label>
            <input type="text" id="username" placeholder="ناوی ئەکاونت بنووسە...">
        </div>

        <div class="form-group" id="emailGroup">
            <label id="emailLabel">ئیمێڵ</label>
            <input type="email" id="email" placeholder="example@domain.com">
        </div>

        <div class="form-group">
            <label id="passLabel">وشەنهێنی</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn" id="actionBtn" onclick="handleAuth()">دروست کردن</button>
        <div id="errorMsg" class="error-msg"></div>

        <div class="switch-text">
            <span id="switchQuestion">هەژمارت هەیە؟</span> 
            <a id="switchBtn" onclick="toggleMode()">چوونە ژوورەوە</a>
        </div>

        <!-- بەشی پیشاندانی خاوەن سەحی شین لە خوارەوە -->
        <div class="verified-section">
            <div class="verified-title" id="verifiedTitleText">ئەکاونتە باوەڕپێکراوەکان</div>
            <div class="verified-list">
                <!-- نموونەی ئەکاونتی باوەڕپێکراو -->
                <div class="verified-user-card" onclick="alert('کورد لینک - پلاتفۆرمی فەرمی')">
                    <div class="verified-avatar" style="background: linear-gradient(135deg, #8b5cf6, #ec4899);">K</div>
                    <div class="verified-name-wrapper">
                        <span class="verified-username">KrdLink</span>
                        <span class="blue-tick">✓</span>
                    </div>
                </div>
                <div class="verified-user-card" onclick="alert('ئەکاونتی سەرپەرشتیار')">
                    <div class="verified-avatar">A</div>
                    <div class="verified-name-wrapper">
                        <span class="verified-username">Admin</span>
                        <span class="blue-tick">✓</span>
                    </div>
                </div>
                <div class="verified-user-card" onclick="alert('ئەکاونتی پشتیوانی')">
                    <div class="verified-avatar" style="background: linear-gradient(135deg, #10b981, #059669);">S</div>
                    <div class="verified-name-wrapper">
                        <span class="verified-username">Support</span>
                        <span class="blue-tick">✓</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const currentUser = localStorage.getItem('current_user');
            if (currentUser) {
                window.location.href = 'admin.html';
            }
        });

        let isSignup = true;
        let currentLang = 'ku';

        const translations = {
            ku: {
                titleSignup: "دروستکردنی ئەکاونت",
                subSignup: "ئەکاونتێکی نوێ دروست بکە بۆ پلاتفۆرمەکە",
                titleLogin: "چوونە ژوورەوە",
                subLogin: "بۆ چوونە ژوورەوە زانیارییەکانت بنووسە",
                userLabelSignup: "ناوی ئەکاونت",
                userLabelLogin: "ناوی بەکارهێنەر یان ئەکاونت",
                userPlaceholderSignup: "ناوی ئەکاونت بنووسە...",
                userPlaceholderLogin: "ناوی بەکارهێنەر بنووسە...",
                emailLabel: "ئیمێڵ",
                emailPlaceholder: "example@domain.com",
                passLabel: "وشەنهێنی",
                passPlaceholder: "••••••••",
                btnSignup: "دروست کردن",
                btnLogin: "چوونە ژوورەوە",
                qHasAccount: "هەژمارت هەیە؟",
                qNoAccount: "هەژمارت نییە؟",
                linkLogin: "چوونە ژوورەوە",
                linkSignup: "دروست کردن",
                verifiedTitle: "ئەکاونتە باوەڕپێکراوەکان",
                errFields: "تکایە هەموو خانە پێویستەکان پڕ بکەرەوە!",
                errExists: "ئەم ناو یان ئیمێڵە پێشتر دروست کراوە!",
                errLogin: "ناوی ئەکاونت یان وشەنهێنی هەڵەیە!",
                successMsg: "ئەکاونتەکەت بە سەرکەوتوویی دروست کرا! ئێستا دەتوانیت لۆگین بکەی."
            },
            en: {
                titleSignup: "Create Account",
                subSignup: "Create a new account for the platform",
                titleLogin: "Login",
                subLogin: "Enter your credentials to login",
                userLabelSignup: "Account Name",
                userLabelLogin: "Username or Account",
                userPlaceholderSignup: "Enter account name...",
                userPlaceholderLogin: "Enter username...",
                emailLabel: "Email",
                emailPlaceholder: "example@domain.com",
                passLabel: "Password",
                passPlaceholder: "••••••••",
                btnSignup: "Create",
                btnLogin: "Login",
                qHasAccount: "Already have an account?",
                qNoAccount: "Don't have an account?",
                linkLogin: "Login",
                linkSignup: "Create",
                verifiedTitle: "Verified Accounts",
                errFields: "Please fill in all required fields!",
                errExists: "This name or email already exists!",
                errLogin: "Incorrect account name or password!",
                successMsg: "Account created successfully! You can now log in."
            }
        };

        function changeLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            const htmlTag = document.getElementById('htmlTag');

            if (lang === 'en') {
                htmlTag.setAttribute('dir', 'ltr');
                htmlTag.setAttribute('lang', 'en');
            } else {
                htmlTag.setAttribute('dir', 'rtl');
                htmlTag.setAttribute('lang', 'ku');
            }

            if (isSignup) {
                document.getElementById('formTitle').innerText = t.titleSignup;
                document.getElementById('formSubtitle').innerText = t.subSignup;
                document.getElementById('actionBtn').innerText = t.btnSignup;
                document.getElementById('userLabel').innerText = t.userLabelSignup;
                document.getElementById('username').placeholder = t.userPlaceholderSignup;
                document.getElementById('switchQuestion').innerText = t.qHasAccount;
                document.getElementById('switchBtn').innerText = t.linkLogin;
            } else {
                document.getElementById('formTitle').innerText = t.titleLogin;
                document.getElementById('formSubtitle').innerText = t.subLogin;
                document.getElementById('actionBtn').innerText = t.btnLogin;
                document.getElementById('userLabel').innerText = t.userLabelLogin;
                document.getElementById('username').placeholder = t.userPlaceholderLogin;
                document.getElementById('switchQuestion').innerText = t.qNoAccount;
                document.getElementById('switchBtn').innerText = t.linkSignup;
            }

            document.getElementById('emailLabel').innerText = t.emailLabel;
            document.getElementById('email').placeholder = t.emailPlaceholder;
            document.getElementById('passLabel').innerText = t.passLabel;
            document.getElementById('password').placeholder = t.passPlaceholder;
            document.getElementById('verifiedTitleText').innerText = t.verifiedTitle;
        }

        function toggleMode() {
            isSignup = !isSignup;
            changeLanguage(currentLang);
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('emailGroup').style.display = isSignup ? "block" : "none";
        }

        function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const t = translations[currentLang];

            if (!user || !pass || (isSignup && !email)) {
                errorMsg.innerText = t.errFields;
                errorMsg.style.display = 'block';
                return;
            }

            let users = JSON.parse(localStorage.getItem('krd_users')) || [];

            if (isSignup) {
                const exists = users.find(u => u.username === user || u.email === email);
                if (exists) {
                    errorMsg.innerText = t.errExists;
                    errorMsg.style.display = 'block';
                    return;
                }
                users.push({ email: email, username: user, password: pass });
                localStorage.setItem('krd_users', JSON.stringify(users));
                alert(t.successMsg);
                toggleMode();
            } else {
                const validUser = users.find(u => u.username === user && u.password === pass);
                if (validUser || (users.length === 0 && user === "admin" && pass === "admin")) {
                    localStorage.setItem('current_user', user);
                    window.location.href = 'admin.html';
                } else {
                    errorMsg.innerText = t.errLogin;
                    errorMsg.style.display = 'block';
                }
            }
        }
    </script>

</body>
</html>
