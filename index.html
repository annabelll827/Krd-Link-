<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krd Link - لینکەکانی من</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=150" alt="Krd Link Logo" class="profile-img">
        
        <h1>Krd Link</h1>
        <p class="bio">هەموو لینک و بەرنامەکانت لە یەک شوێن.</p>

        <!-- لیستی لینکەکان کە لێرەدا بە شێوازی خۆکار دەردەکەون -->
        <div class="links-list" id="linksContainer">
            <!-- لینکەکان لێرەدا بە جافااسکریپت دادەنرێن -->
        </div>

        <footer>
            Krd Link &copy; 2026
        </footer>
    </div>

    <script>
        // خوێندنەوەی لینکەکان لە LocalStorage
        window.addEventListener('DOMContentLoaded', () => {
            const savedLinks = JSON.parse(localStorage.getItem('krd_links')) || [
                { name: "سێرڤەری دیسکۆرد", url: "https://discord.com", icon: "fa-discord" },
                { name: "پڕۆژەکانی گیتهەب", url: "https://github.com", icon: "fa-github" },
                { name: "کەناڵی تێلیگرام", url: "https://t.me", icon: "fa-telegram" }
            ];

            const container = document.getElementById('linksContainer');
            container.innerHTML = '';

            savedLinks.forEach(link => {
                const a = document.createElement('a');
                a.href = link.url;
                a.target = "_blank";
                a.className = "link-card";
                a.innerHTML = `
                    <i class="fa-solid fa-chevron-left arrow"></i>
                    <span>${link.name}</span>
                    <i class="fa-brands ${link.icon || 'fa-link'} left-icon"></i>
                `;
                container.appendChild(a);
            });
        });
    </script>

</body>
</html>
