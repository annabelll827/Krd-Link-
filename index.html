<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krd Link - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Vazirmatn', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .dashboard-header {
            width: 100%;
            max-width: 440px;
            background: #0a0a0a;
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            box-sizing: border-box;
        }

        .header-left-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-btn, .logout-icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .menu-btn:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: rgba(168, 85, 247, 0.4);
        }

        .logout-icon-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
            color: #ef4444;
        }

        .dashboard-container {
            width: 100%;
            max-width: 440px;
            background: #0a0a0a;
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .profile-card, .stats-card, .clicks-card {
            background: #0d0d0d;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 24px;
            box-sizing: border-box;
        }

        .profile-top-row, .stats-top-row, .clicks-top-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .profile-icon-box, .stats-icon-box, .clicks-icon-box {
            border-radius: 12px;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-icon-box { background: rgba(234, 179, 8, 0.12); color: #eab308; }
        .stats-icon-box { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .clicks-icon-box { background: rgba(168, 85, 247, 0.15); color: #a855f7; }

        .title-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #94a3b8;
            font-weight: 700;
        }

        .username-display, .number-display {
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            text-align: right;
        }
        
        .number-display { font-size: 2.8rem; line-height: 1; }

        /* مێنیووی لاوەکی */
        .menu-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .menu-overlay.active { display: flex; }
        .menu-modal {
            background: #0a0a0a;
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 28px;
            width: 90%; max-width: 400px; padding: 25px;
            box-sizing: border-box;
        }
        .close-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%; width: 36px; height: 36px;
            display: flex; justify-content: center; align-items: center;
            color: #fff; cursor: pointer; margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <header class="dashboard-header">
        <!-- دوگمەی مێنیوو (سێ خطەکە) -->
        <button class="menu-btn" onclick="toggleMenu()">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>

        <!-- دوگمەی گەڕانەوە (چوونە دەرەوە) لەو شوێنەی داوات کردووە -->
        <div class="header-left-actions">
            <a href="index.html" class="logout-icon-btn" title="چوونە دەرەوە">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                </svg>
            </a>
        </div>
    </header>

    <div class="dashboard-container">
        <div class="profile-card">
            <div class="profile-top-row">
                <div class="profile-icon-box">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                </div>
                <div class="title-tag">YOUR PROFILE</div>
            </div>
            <div class="username-display" id="displayUsername">username</div>
        </div>

        <div class="stats-card">
            <div class="stats-top-row">
                <div class="stats-icon-box">
                    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                </div>
                <div class="title-tag">PROFAIL VIUW</div>
            </div>
            <div class="number-display" id="profileViewsCount">0</div>
        </div>

        <div class="clicks-card">
            <div class="clicks-top-row">
                <div class="clicks-icon-box">
                    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                </div>
                <div class="title-tag">LINK CLICKS</div>
            </div>
            <div class="number-display" id="linkClicksCount">0</div>
        </div>
    </div>

    <!-- مێنیووی لایەتەکی -->
    <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()">
        <div class="menu-modal" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="toggleMenu()">✕</button>
            <p style="color: #fff; text-align: center;">مێنیووی سەرەکی</p>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const currentUser = localStorage.getItem('current_user');
            if (!currentUser) {
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('displayUsername').innerText = currentUser;
            
            let currentViews = (parseInt(localStorage.getItem('profile_views_' + currentUser)) || 0) + 1;
            localStorage.setItem('profile_views_' + currentUser, currentViews);
            document.getElementById('profileViewsCount').innerText = currentViews;
            
            document.getElementById('linkClicksCount').innerText = localStorage.getItem('link_clicks_' + currentUser) || 0;
        });

        function toggleMenu() {
            document.getElementById('menuOverlay').classList.toggle('active');
        }
    </script>
</body>
</html>
