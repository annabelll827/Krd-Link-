<!DOCTYPE html>
<html lang="ku" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krd Link - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Vazirmatn', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .dashboard-header {
            width: 100%;
            max-width: 440px;
            background: #0a0a0a;
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 0 0 20px rgba(139, 92, 246, 0.05);
            box-sizing: border-box;
        }

        .menu-btn, .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            cursor: pointer;
            transition: background 0.3s, border-color 0.3s;
            text-decoration: none;
        }

        .menu-btn:hover, .back-btn:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: rgba(168, 85, 247, 0.4);
        }

        .dashboard-container {
            width: 100%;
            max-width: 440px;
            background: #0a0a0a;
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 0 0 20px rgba(139, 92, 246, 0.05);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- بەشی پڕۆفایل و ئامارەکان --- */
        .profile-card {
            background: #0d0d0d;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 24px;
            position: relative;
            box-sizing: border-box;
        }

        .profile-top-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 25px;
        }

        .profile-icon-box {
            background: rgba(234, 179, 8, 0.12);
            border-radius: 12px;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #eab308;
        }

        .profile-title-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #94a3b8;
            font-weight: 700;
        }

        .profile-username-display {
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            text-align: right;
            margin-bottom: 10px;
            direction: ltr;
        }

        .stats-card {
            background: #07130f;
            border: 1px solid rgba(16, 185, 129, 0.15);
            border-radius: 24px;
            padding: 24px;
            position: relative;
            box-sizing: border-box;
        }

        .stats-top-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .stats-icon-box {
            background: rgba(16, 185, 129, 0.15);
            border-radius: 14px;
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #10b981;
        }

        .stats-title-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #94a3b8;
            font-weight: 700;
        }

        .stats-number-row {
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .stats-number {
            font-size: 2.8rem;
            font-weight: 700;
            color: #ffffff;
            line-height: 1;
        }

        .clicks-card {
            background: #130a1c;
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 24px;
            padding: 24px;
            position: relative;
            box-sizing: border-box;
        }

        .clicks-top-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .clicks-icon-box {
            background: rgba(168, 85, 247, 0.15);
            border-radius: 14px;
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #a855f7;
        }

        .clicks-title-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #94a3b8;
            font-weight: 700;
        }

        .clicks-number-row {
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .clicks-number {
            font-size: 2.8rem;
            font-weight: 700;
            color: #ffffff;
            line-height: 1;
        }

        /* --- شێوازی پەڕەی Badge Overview --- */
        .badge-view-container {
            display: none;
            width: 100%;
            max-width: 440px;
            background: #0a0a0a;
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 28px;
            padding: 25px;
            box-sizing: border-box;
            flex-direction: column;
            gap: 20px;
        }

        .badge-card {
            background: #0d0d0d;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .badge-icon {
            width: 42px;
            height: 42px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
        }

        .badge-details h4 {
            margin: 0 0 4px 0;
            font-size: 1rem;
            color: #ffffff;
            font-weight: 700;
        }

        .badge-details p {
            margin: 0;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .badge-action-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 8px 14px;
            color: #94a3b8;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            text-decoration: none;
        }

        /* --- دیزاین مێنیووی تەنیشت (Sidebar Menu Modal) --- */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .menu-overlay.active {
            display: flex;
            opacity: 1;
        }

        .menu-modal {
            background: #0a0a0a;
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 28px;
            width: 90%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.9), 0 0 25px rgba(139, 92, 246, 0.1);
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .menu-overlay.active .menu-modal {
            transform: scale(1);
        }

        .menu-top-row {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            cursor: pointer;
            transition: background 0.3s;
        }

        .close-btn:hover {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
        }

        .menu-lang-box {
            background: #050505;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .lang-select {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }

        .lang-select option {
            background: #0a0a0a;
            color: #fff;
        }

        .menu-section-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin: 18px 0 10px 0;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-items-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 14px;
            color: #cbd5e1;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .menu-item.active {
            background: rgba(139, 92, 246, 0.15);
            border-color: rgba(168, 85, 247, 0.4);
            color: #fff;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .menu-item svg {
            color: #a855f7;
        }
    </style>
</head>
<body>

    <header class="dashboard-header">
        <button class="menu-btn" onclick="toggleMenu()">

    <!-- پەنجەرەی مێنیووی تەنیشت (Sidebar Menu Modal) -->
    <div class="menu-overlay" id="menuOverlay" onclick="closeMenuOutside(event)">
        <div class="menu-modal">
            <div class="menu-top-row">
                <button class="close-btn" onclick="toggleMenu()">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <div class="menu-lang-box">
                <select class="lang-select" id="languageSelect">
                    <option value="ku">کوردی (Kurdish)</option>

                </select>
            </div>

            <!-- بەشی Overview -->
            <div class="menu-section-label">
                <span>Overview</span>
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path></svg>

                    <span>Overview</span>

                    <span>Badge Overview</span>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const currentUser = localStorage.getItem('current_user');
            if (!currentUser) {
                window.location.href = 'index.html';
                return;
            }
            
            document.getElementById('displayUsername').innerText = currentUser;

            const viewKey = 'profile_views_' + currentUser;
            let currentViews = parseInt(localStorage.getItem(viewKey)) || 0;
            currentViews += 1;
            localStorage.setItem(viewKey, currentViews);
            document.getElementById('profileViewsCount').innerText = currentViews;

            const clicksKey = 'link_clicks_' + currentUser;
            let currentClicks = parseInt(localStorage.getItem(clicksKey)) || 0;
            document.getElementById('linkClicksCount').innerText = currentClicks;
        });

        function switchSection(section) {
            const overviewSec = document.getElementById('overviewSection');
            const badgeSec = document.getElementById('badgeSection');
            const menuOverview = document.getElementById('menuOverview');
            const menuBadge = document.getElementById('menuBadge');

            if (section === 'overview') {
                overviewSec.style.display = 'flex';
                badgeSec.style.display = 'none';
                menuOverview.classList.add('active');
                menuBadge.classList.remove('active');
            } else if (section === 'badge') {
                overviewSec.style.display = 'none';
                badgeSec.style.display = 'flex';
                menuBadge.classList.add('active');
                menuOverview.classList.remove('active');
            }
            toggleMenu();
        }

        function toggleMenu() {
            const overlay = document.getElementById('menuOverlay');
            overlay.classList.toggle('active');
        }

        function closeMenuOutside(event) {
            const overlay = document.getElementById('menuOverlay');
            if (event.target === overlay) {
                overlay.classList.remove('active');
            }
        }
    </script>

</body>
</html>
